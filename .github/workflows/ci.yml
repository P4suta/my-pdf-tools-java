# Consolidated monorepo CI — builds and checks all 27 modules (3 apps + the
# unified pipeline = 4 hexagonal stacks x 5 layers + 7 shared modules) in one
# workflow.
#
# Policy (inherited from register/despeckle's best-of-breed CI):
#   - No `on: schedule` here; the only scheduled job is freshness.yml.
#   - Every action is SHA-pinned; Dependabot bumps the pins weekly.
#   - The monorepo build is Docker-only: there is no host JVM. The self-contained
#     dev image (root Dockerfile) carries the entire toolchain — Liberica JDK 25
#     Full, Leptonica, the PDF toolbox (poppler/qpdf/jbig2enc), the font stack,
#     and the peripheral linters — so `build` and `rewrite-advisory` run inside
#     it via `docker compose run --rm dev ./gradlew …`.
#   - `lint` is the one job that does NOT use the dev image: it runs the
#     peripheral linters on a bare ubuntu runner with the tool versions curl-
#     pinned to match the Dockerfile, so CI and the container can never format
#     with different versions.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # This job NAME is a required-status-check context in main's branch protection, so it is kept
    # byte-stable even though the module count is now 27 (renaming it would orphan the required
    # check). Retitle to a count-free name only together with a protection edit to the new context.
    name: build + check (all 22 modules)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # compose runs the container as ${UID:-1000}:${GID:-1000} and bind-mounts
      # the checkout at /workspace; the GitHub runner user is uid 1001, so without
      # this the container would run as 1000 and Gradle could not write the
      # 1001-owned build/ and .gradle-home dirs. Export the real ids for every
      # `docker compose` step in this job.
      - name: export host uid/gid for compose
        run: |
          echo "UID=$(id -u)" >> "$GITHUB_ENV"
          echo "GID=$(id -g)" >> "$GITHUB_ENV"
      # Persist the Gradle user-home across runs. The gate runs Gradle INSIDE the dev container with
      # GRADLE_USER_HOME=/workspace/.gradle-home (compose.yml), which on an ephemeral runner starts
      # empty every run — so a cold `gradle build` re-downloads every dependency and recompiles all
      # 27 modules from scratch (the bulk of this job's time). gradle/actions/setup-gradle cannot help
      # here (it caches the HOST ~/.gradle; our Gradle is in the container), so cache the bind-mounted
      # dir directly. run_id makes each run save a fresh entry; restore-keys fall back to the newest
      # compatible cache, keeping the build cache warm as sources evolve. The cross-OS dist legs get
      # the same benefit via setup-gradle; this closes the gap for the Docker-based jobs.
      - name: cache gradle home
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            .gradle-home/caches
            .gradle-home/wrapper
          key: gradle-home-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}-${{ github.run_id }}
          restore-keys: |
            gradle-home-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}-
            gradle-home-${{ runner.os }}-
      # Build THIS branch's Dockerfile (a PR that adds a tool must not run against ghcr's stale
      # :latest — that broke with `pnpm: not found`), but feed BuildKit the GitHub Actions layer
      # cache that dev-image.yml populates (cache-to: type=gha,mode=max). On an unchanged Dockerfile
      # every layer — notably the jbig2enc-from-source build — is a cache hit, so the rebuild drops
      # from ~1min to ~15s; a Dockerfile change rebuilds only the affected layers. `load: true` puts
      # the image (tagged as compose.yml's `image:` ref) into the local daemon so the
      # `docker compose run` steps below reuse it (pull_policy: missing). This job owns cache-to to
      # keep the shared cache warm across runs; the other docker jobs read it cache-from-only.
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: build dev image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          tags: ghcr.io/p4suta/my-pdf-tools-java-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # `build` runs the entire quality gate across every module: Error Prone
      # (compileJava), Spotless (spotlessCheck), SpotBugs, NullAway, the JUnit
      # suites and JaCoCo. Toolchain auto-download stays off — the image's
      # Liberica Full JDK is the only JDK and jlink/jpackage need its jmods.
      - name: gradle build
        run: >-
          docker compose run --rm dev
          ./gradlew build --no-daemon --console=plain
          -Dorg.gradle.java.installations.auto-download=false
      - name: upload reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reports
          # Every module has its own build dir (the root is a pure aggregator),
          # so glob across all of them for the failure diagnostics.
          path: |
            **/build/reports/
            **/build/test-results/
          if-no-files-found: ignore

  web:
    name: web frontend (prettier / svelte-check / build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The SPA's Node + pnpm toolchain lives in the dev image at pinned versions (same as the build
      # job), so Prettier, svelte-check, and the vite build all run there rather than against a
      # different host toolchain. See the build job for the uid/gid rationale.
      - name: export host uid/gid for compose
        run: |
          echo "UID=$(id -u)" >> "$GITHUB_ENV"
          echo "GID=$(id -g)" >> "$GITHUB_ENV"
      # See the build job: build the branch Dockerfile but read dev-image.yml's GitHub Actions layer
      # cache so an unchanged Dockerfile is a near-instant hit. Read-only (no cache-to) — the build
      # job owns writing the shared cache. `load: true` tags it as compose.yml's `image:` ref so the
      # `docker compose run` step below reuses it.
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: build dev image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          tags: ghcr.io/p4suta/my-pdf-tools-java-dev:latest
          cache-from: type=gha
      # format:check is Prettier over the Svelte + CSS (Biome owns js/ts/json in the lint job);
      # `build` is svelte-check (strict tsconfig) followed by the vite production build.
      - name: pnpm install + format + svelte-check + build
        run: >-
          docker compose run --rm dev sh -lc
          'cd webapp/frontend && pnpm install --frozen-lockfile && pnpm run format:check && pnpm run build'

  lint:
    name: lint (yaml / json / toml / spell / actions)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2
      # Versions pinned to match the dev image (root Dockerfile) so CI and the
      # container can never check formatting with different tool versions.
      - name: install biome + taplo + yamlfmt + actionlint
        run: |
          BIOME_VERSION=2.4.16
          curl -fsSL "https://github.com/biomejs/biome/releases/download/@biomejs/biome@${BIOME_VERSION}/biome-linux-x64" \
            -o /usr/local/bin/biome
          sudo chmod +x /usr/local/bin/biome
          TAPLO_VERSION=0.10.0
          curl -fsSL "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz" \
            | gunzip | sudo tee /usr/local/bin/taplo > /dev/null
          sudo chmod +x /usr/local/bin/taplo
          YAMLFMT_VERSION=0.21.0
          curl -fsSL "https://github.com/google/yamlfmt/releases/download/v${YAMLFMT_VERSION}/yamlfmt_${YAMLFMT_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar xz -C /usr/local/bin yamlfmt
          ACTIONLINT_VERSION=1.7.12
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin actionlint
      # `biome ci` runs the formatter, linter, and import-sort in check mode (not just format),
      # and --error-on-warnings makes any lint warning fail — the JS/TS/JSON gate is zero-tolerance.
      - run: biome ci --error-on-warnings .
      - run: taplo fmt --check
      # No path arg: a path overrides .yamlfmt's include/exclude, so `yamlfmt --lint .` would lint
      # pnpm-lock.yaml / node_modules. Bare `--lint` honors the config globs (matches `just fmt-check`).
      - run: yamlfmt --lint
      - run: actionlint -color

  rewrite-advisory:
    name: openrewrite (advisory, non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Advisory only: this job must never fail the workflow. The blocking gate is
    # `build`; OpenRewrite stays out of it by design (build.gradle.kts +
    # rewrite.yml). rewriteDryRun parses sources only.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # See the build job: compose must run as the 1001 runner user, not the 1000
      # default, or Gradle cannot write into the bind-mounted checkout.
      - name: export host uid/gid for compose
        run: |
          echo "UID=$(id -u)" >> "$GITHUB_ENV"
          echo "GID=$(id -g)" >> "$GITHUB_ENV"
      # Restore-only: reuse the Gradle home the build job populates (warm dependencies for the
      # dry-run) without saving a second, duplicate cache from this advisory job.
      - name: restore gradle home
        uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            .gradle-home/caches
            .gradle-home/wrapper
          key: gradle-home-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-home-${{ runner.os }}-
      # See the build job: build the branch Dockerfile but read dev-image.yml's GitHub Actions layer
      # cache so an unchanged Dockerfile is a near-instant hit. Read-only (no cache-to) — the build
      # job owns writing the shared cache. `load: true` tags it as compose.yml's `image:` ref so the
      # `docker compose run` step below reuses it.
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: build dev image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          tags: ghcr.io/p4suta/my-pdf-tools-java-dev:latest
          cache-from: type=gha
      # Emits the proposed patch to build/reports/rewrite/rewrite.patch and exits
      # 0 even with suggestions, so the job is informational. OpenRewrite is not
      # configuration-cache compatible (CC is on by default in gradle.properties),
      # so the dry-run opts out of it.
      - name: gradle rewriteDryRun
        run: >-
          docker compose run --rm dev
          ./gradlew rewriteDryRun --no-daemon --console=plain --no-configuration-cache
          -Dorg.gradle.java.installations.auto-download=false
      - name: upload rewrite patch
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rewrite-patch
          path: build/reports/rewrite/rewrite.patch
          # warn (not ignore) so a dry-run that crashed before writing the patch
          # is visible as an annotation, even though the job is non-blocking.
          if-no-files-found: warn
