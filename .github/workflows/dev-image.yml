# Builds the self-contained monorepo dev image and pushes it to ghcr.io.
#
# Why a pre-built image (vs `docker compose build` on every clone / CI run):
#   - Developers and CI `docker compose pull dev` (~20 s) instead of rebuilding
#     the whole toolchain — most importantly the jbig2enc-from-source layer.
#   - `cache-from: type=gha` keeps the apt + tool-download layers warm.
#
# The pushed ref is the SAME lowercase string compose.yml pins as the dev
# service `image:` (ghcr.io/p4suta/my-pdf-tools-java-dev:latest), so CI's
# `docker compose pull dev` retrieves exactly what this workflow publishes.
#
# Trigger policy (NO cron — the user's CI preference is no scheduled runs):
#   - push to main that touches the Dockerfile, compose.yml, or this workflow
#   - manual workflow_dispatch for ad-hoc rebuilds

name: dev-image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - compose.yml
      - .github/workflows/dev-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: dev-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: build + push to ghcr.io
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # The image ref is hardcoded lowercase, not derived from
      # ${{ github.repository_owner }}: the owner is `P4suta` (capital P) and
      # GHCR refs must be lowercase, so the literal keeps the push target byte-
      # identical to compose.yml's `image:` pin.
      - name: docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/p4suta/my-pdf-tools-java-dev
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
      - name: build + push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
