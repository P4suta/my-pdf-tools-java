# Distribution / packaging — builds each app's self-contained jpackage app-image
# (via the p4suta.distribution-conventions plugin) and runs a real-workload smoke
# over the built launcher.
#
# Platform coverage grows as each app's native set is sourced per OS:
#   - Linux (dev image): all four apps, which carry Leptonica + the PDF toolbox +
#     jbig2 from the image. register/despeckle/pdfbook bundle the Leptonica FFM
#     library + their tool closure; tate bundles only qpdf.
#   - tate-yoko-pdf: also macOS + Windows — no FFM dependency, only the per-OS
#     qpdf zip the Gradle build self-downloads.
#   - pdfbook: also Windows — it needs Leptonica (FFM) + poppler
#     (pdfimages/pdfinfo) + qpdf, but NOT jbig2 (its register STAGE writes TIFF-G4
#     and the pack embeds CCITT G4), so its Windows natives come from the MSYS2
#     mingw64 toolchain (leptonica + poppler) plus the Ivy qpdf. macOS for pdfbook
#     and Windows/macOS for register+despeckle (which DO need jbig2enc, built from
#     source) follow once the Windows mechanism is proven here.
#
# Every action is SHA-pinned; Dependabot bumps the pins weekly.

name: distribution

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # All Linux app-images build in the self-contained dev image (root Dockerfile):
  # register + despeckle (Leptonica FFM) and tate-yoko-pdf's Linux leg. register
  # and despeckle ship as installDist launchers; tate ships as a jpackage
  # app-image (jlink-trimmed JRE + bundled qpdf). Each app's smoke runs its built
  # launcher and asserts a clean exit / a valid PDF.
  dist-linux:
    name: dist + smoke (linux, dev image)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # compose runs as ${UID:-1000}:${GID:-1000}; the runner user is uid 1001, so
      # export the real ids or Gradle cannot write the bind-mounted build/ dirs.
      - name: export host uid/gid for compose
        run: |
          echo "UID=$(id -u)" >> "$GITHUB_ENV"
          echo "GID=$(id -g)" >> "$GITHUB_ENV"
      # Cache the in-container Gradle user-home (deps + build cache + wrapper) across runs, exactly
      # as ci.yml's build job does: Gradle runs inside the dev container so setup-gradle cannot cache
      # it, and an ephemeral runner starts cold otherwise. The cross-OS legs already cache via
      # setup-gradle in setup-jdk-gradle; this closes the gap for this Docker-based leg.
      - name: cache gradle home
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .gradle-home/caches
            .gradle-home/wrapper
          key: gradle-home-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}-${{ github.run_id }}
          restore-keys: |
            gradle-home-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}-
            gradle-home-${{ runner.os }}-
      # Build the branch Dockerfile but read dev-image.yml's GitHub Actions layer cache (see ci.yml's
      # build job) so an unchanged Dockerfile is a near-instant hit instead of recompiling the whole
      # toolchain (notably jbig2enc-from-source) every run. Read-only — ci.yml's build job owns
      # cache-to. `load: true` tags it as compose.yml's `image:` ref so the `docker compose run`
      # steps below reuse it (pull_policy: missing).
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: build dev image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: ghcr.io/p4suta/my-pdf-tools-java-dev:latest
          cache-from: type=gha

      # tate-yoko-pdf: full jpackage app-image + the cross-platform SmokeCheck
      # (converts a sample PDF through the built launcher, asserts the %PDF magic).
      - name: tate-yoko-pdf jpackage + smoke
        run: >-
          docker compose run --rm dev
          ./gradlew :tate-yoko-pdf:app:jpackageImage :tate-yoko-pdf:app:smokeCheck
          --no-daemon --console=plain
          -Dorg.gradle.java.installations.auto-download=false

      # register: installDist launcher, then run it with --version (exit 0).
      - name: register installDist + smoke
        run: >-
          docker compose run --rm dev bash -lc '
          ./gradlew :register:app:installDist --no-daemon --console=plain
          -Dorg.gradle.java.installations.auto-download=false
          && register/app/build/install/register/bin/register --version'

      # despeckle: installDist launcher, then run it with --version (exit 0).
      - name: despeckle installDist + smoke
        run: >-
          docker compose run --rm dev bash -lc '
          ./gradlew :despeckle:app:installDist --no-daemon --console=plain
          -Dorg.gradle.java.installations.auto-download=false
          && despeckle/app/build/install/despeckle/bin/despeckle --version'

      # pipeline (pdfbook): installDist launcher, then run the whole single-pass pipeline
      # (extract -> despeckle -> register -> RTL spread) on a synthetic sample scan and assert the
      # one output is a valid PDF. This is the end-to-end smoke for the unified pipeline; it needs
      # Leptonica + pdfimages/pdfinfo + qpdf (NOT jbig2 — pdfbook packs CCITT G4, never JBIG2). The
      # self-contained app-image leg for the same pipeline runs cross-OS in dist-pdfbook-crossos.
      - name: pipeline (pdfbook) installDist + smoke
        run: >-
          docker compose run --rm dev bash -lc '
          ./gradlew :pipeline:app:installDist :register:infrastructure:createSamplePdf
          --no-daemon --console=plain
          -Dorg.gradle.java.installations.auto-download=false
          && pipeline/app/build/install/pdfbook/bin/pdfbook
          register/infrastructure/build/sample/sample.pdf -o /tmp/pdfbook-smoke.pdf
          && test -s /tmp/pdfbook-smoke.pdf
          && head -c4 /tmp/pdfbook-smoke.pdf | grep -q "%PDF"'

      # webapp self-contained app-image: the Spring Boot server as a Docker-free, JDK-free app-image
      # with the pdfbook app-image NESTED inside ($APPDIR/tools/pdfbook), the server pointed at it via
      # -Dp4suta.pdfbook.path. Building it transitively runs :pipeline:app:package (the JPACKAGE image
      # nesting needs — not installDist) and the Gradle SPA build (node/pnpm are in the dev image).
      # Linux needs NO -Pp4suta.nativePrefix: the convention resolves Leptonica off the multiarch lib
      # dir and pdfimages/pdfinfo/qpdf off PATH. dist-smoke.sh starts the built server PATH-EMPTY and
      # drives a real conversion through the nested pdfbook — the whole chain, self-contained, on Linux.
      - name: webapp self-contained + smoke
        run: >-
          docker compose run --rm dev bash -lc '
          ./gradlew :webapp:app:package :register:infrastructure:createSamplePdf
          --no-daemon --console=plain
          -Dorg.gradle.java.installations.auto-download=false
          && bash webapp/app/dist-smoke.sh
          webapp/app/build/dist-app/pdfbook-web/bin/pdfbook-web'

      - name: upload app-images on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-linux-reports
          path: |
            **/build/reports/
            **/build/dist-jpackage/
          if-no-files-found: ignore

  # tate-yoko-pdf cross-OS legs. macOS/Windows have no dev image, so they run
  # natively on the matching host — exactly as tate's original CI did: setup-java
  # (Liberica 25 Full, which ships the jmods jlink/jpackage need; Temurin omits
  # them) plus the OS package manager for qpdf. jpackage emits an OS-native
  # launcher (Contents/MacOS/<name> on macOS, <name>.exe on Windows), so each
  # must build on its own host. The Linux leg lives in dist-linux above.
  dist-tate-crossos:
    name: tate jpackage + smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Liberica JDK 25 Full (jmods for jlink/jpackage) + Gradle — shared composite.
      - uses: ./.github/actions/setup-jdk-gradle

      # qpdf per OS, as tate's original CI relied on. The Gradle build bundles a
      # qpdf zip on Windows from qpdf's releases; macOS has no upstream Darwin
      # binary, so QpdfLinearizer uses its PATH/noOp fallback — installing qpdf
      # here gives that fallback a real binary to find for the smoke conversion.
      - name: install qpdf (macOS)
        if: runner.os == 'macOS'
        run: brew install qpdf
      - name: install qpdf (Windows)
        if: runner.os == 'Windows'
        run: choco install qpdf --no-progress

      - name: build app-image
        run: ./gradlew :tate-yoko-pdf:app:jpackageImage :tate-yoko-pdf:app:createSamplePdf --no-daemon --console=plain
      # SmokeCheck.java resolves the OS-specific launcher path, runs the
      # conversion, and asserts the %PDF magic — one task for every host.
      - name: CLI smoke
        run: ./gradlew :tate-yoko-pdf:app:smokeCheck --no-daemon --console=plain

      - name: upload app-image on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tate-dist-${{ matrix.os }}
          path: tate-yoko-pdf/app/build/dist-jpackage/
          if-no-files-found: ignore

  # pdfbook self-contained app-image on Windows (macOS follows once this mechanism
  # is proven). pdfbook's native set is Leptonica (FFM) + poppler
  # (pdfimages/pdfinfo) + qpdf — no jbig2enc — so leptonica + poppler come from
  # the MSYS2 mingw64 toolchain (one coherent ABI, which matters because the
  # Leptonica the FFM layer loads and the one poppler links must match), and qpdf
  # is the self-contained Ivy zip the Gradle build already bundles per OS.
  # -Pp4suta.nativePrefix points the distribution convention's native staging at
  # that prefix. The smoke pushes a real scan PDF through the built launcher and
  # asserts a LINEARIZED output: that exercises the Leptonica FFM path (the one
  # co-location question on Windows) and the qpdf linearize, so a bundle that
  # silently lost either fails the gate instead of passing on a bare %PDF.
  dist-pdfbook-crossos:
    name: pdfbook self-contained + smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Liberica JDK 25 Full (jmods for jlink/jpackage) + Gradle — shared composite.
      - uses: ./.github/actions/setup-jdk-gradle

      # Leptonica + poppler from one native toolchain (coherent ABI), plus qpdf.
      # Windows: the preinstalled C:\msys64 mingw64 (we drive pacman directly — the
      # setup-msys2 action's @actions/cache step intermittently 400s and offers no
      # toggle, msys2/setup-msys2#183 — and `pacman -S` without `-y` installs from
      # the preinstalled DB with no partial-upgrade). qpdf there is the Ivy zip.
      # macOS: Homebrew (the upstream qpdf release has no Darwin binary, so qpdf is
      # taken from Homebrew as a host tool — see the per-OS branch in the build).
      - name: provision native toolchain (Leptonica + poppler + qpdf)
        id: natives
        uses: ./.github/actions/provision-natives

      - name: build pdfbook app-image + sample scan PDF
        run: >-
          ./gradlew :pipeline:app:package :register:infrastructure:createSamplePdf
          "-Pp4suta.nativePrefix=${{ steps.natives.outputs.native-prefix }}"
          --no-daemon --console=plain

      # Real-workload smoke: the registration stage drives Leptonica through FFM
      # (the dependent-library co-location question), pdfimages extracts, qpdf
      # linearizes. Assert a LINEARIZED PDF, not merely a clean exit.
      - name: real-PDF smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $launcher = "pipeline\app\build\dist-jpackage\pdfbook\pdfbook.exe"
          $sample   = "register\infrastructure\build\sample\sample.pdf"
          & $launcher $sample -o out.pdf
          if ($LASTEXITCODE -ne 0) { throw "pdfbook exited $LASTEXITCODE" }
          ./scripts/dist-assert-pdf.ps1 out.pdf Linearized
      - name: real-PDF smoke (macOS)
        if: runner.os == 'macOS'
        run: |
          launcher="pipeline/app/build/dist-jpackage/pdfbook.app/Contents/MacOS/pdfbook"
          sample="register/infrastructure/build/sample/sample.pdf"
          "$launcher" "$sample" -o out.pdf
          bash scripts/dist-assert-pdf.sh out.pdf Linearized

      - name: upload pdfbook app-image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdfbook-${{ matrix.os }}
          path: pipeline/app/build/dist-jpackage/
          if-no-files-found: error

      # On failure, also surface the staged native closure so a dependent-library
      # resolution problem can be diagnosed from the artifact.
      - name: upload staged natives on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdfbook-${{ matrix.os }}-debug
          path: |
            pipeline/app/build/dist-natives/
            pipeline/app/build/dist-jpackage/
          if-no-files-found: ignore

  # webapp self-contained app-image cross-OS (Windows + macOS). The webapp `package` NESTS the pdfbook
  # app-image under $APPDIR/tools/pdfbook and points the server at it via -Dp4suta.pdfbook.path, so
  # building it transitively runs :pipeline:app:package — the SAME native set as dist-pdfbook-crossos
  # (Leptonica FFM + poppler + qpdf; NO jbig2, pdfbook packs CCITT G4). The native provisioning below
  # is therefore identical to that leg. It ALSO builds the Svelte SPA into the bootJar, so node + pnpm
  # must be on PATH for the Gradle frontend build (:webapp:frontend, download=false): the cross-OS
  # runners have no dev image, so setup-node + a pinned pnpm stand in for the dev image's baked
  # toolchain, at the SAME versions the Dockerfile ARGs pin (kept in lockstep by hand, like ci.yml's
  # biome/actionlint pins). dist-smoke starts the app-image's server PATH-EMPTY, converts a scan
  # through the nested pdfbook, and asserts a LINEARIZED PDF — so a bundle that lost the nest, a
  # native, or the qpdf linearize fails the gate instead of passing on a bare server boot.
  dist-webapp-crossos:
    name: webapp self-contained + smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Liberica JDK 25 Full (jmods for jlink/jpackage) + Gradle — shared composite.
      - uses: ./.github/actions/setup-jdk-gradle
      # Node + pnpm for the Gradle-driven SPA build (download=false → the PATH node/pnpm). Pinned to
      # the dev image's Dockerfile ARGs (NODE_VERSION / PNPM_VERSION) — keep them in lockstep by hand,
      # as ci.yml's lint job does for biome/actionlint. pnpm is npm-installed, NOT corepack (corepack's
      # runtime signature check goes stale — the Dockerfile rejects it for the same reason).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
      - name: install pinned pnpm
        run: npm install -g pnpm@11.5.1

      # Leptonica + poppler + qpdf — the webapp's transitive pdfbook needs exactly this and no jbig2,
      # so the same provisioning composite as dist-pdfbook-crossos (jbig2 defaults to false).
      - name: provision native toolchain (Leptonica + poppler + qpdf)
        id: natives
        uses: ./.github/actions/provision-natives

      - name: build webapp app-image + sample scan PDF
        run: >-
          ./gradlew :webapp:app:package :register:infrastructure:createSamplePdf
          "-Pp4suta.nativePrefix=${{ steps.natives.outputs.native-prefix }}"
          --no-daemon --console=plain

      # End-to-end server smoke (start PATH-empty, health-poll, convert through the nested pdfbook,
      # assert %PDF + Linearized) — the shared dist-smoke.{ps1,sh}, per OS.
      - name: server smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./webapp/app/dist-smoke.ps1 -Launcher "webapp\app\build\dist-app\pdfbook-web\pdfbook-web.exe"
      - name: server smoke (macOS)
        if: runner.os == 'macOS'
        run: bash webapp/app/dist-smoke.sh "webapp/app/build/dist-app/pdfbook-web.app/Contents/MacOS/pdfbook-web"

      - name: upload webapp app-image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webapp-${{ matrix.os }}
          path: webapp/app/build/dist-app/
          if-no-files-found: error

      # On failure, surface the staged natives, both images, and the server log so a broken nest, a
      # missing native, or a server-start crash can be diagnosed from the artifact.
      - name: upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webapp-${{ matrix.os }}-debug
          path: |
            webapp/app/build/dist-natives/
            webapp/app/build/dist-app/
            pipeline/app/build/dist-jpackage/
            server*.log
          if-no-files-found: ignore

  # register + despeckle self-contained app-images cross-OS. Both repack to
  # lossless JBIG2 (pdfimages -> … -> jbig2), so both need jbig2enc — which is not
  # packaged for mingw64 or Homebrew. It is built from source against the SAME
  # toolchain Leptonica the FFM layer loads (one coherent ABI), pinned to the dev
  # image's 0.31, installed into the prefix so the convention stages jbig2 + its
  # closure. register and despeckle share one toolchain provisioning, so they share
  # one job. The smokes assert a JBIG2 stream (both) and a linearized output
  # (despeckle bundles qpdf; register does not).
  dist-jbig2-apps-crossos:
    name: register + despeckle self-contained + smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Liberica JDK 25 Full (jmods for jlink/jpackage) + Gradle — shared composite.
      - uses: ./.github/actions/setup-jdk-gradle

      # register/despeckle DO need jbig2enc (lossless-JBIG2 repack), built from source against the
      # toolchain Leptonica (one coherent ABI) — so jbig2: true. The composite installs the build
      # toolchain + the from-source jbig2enc per OS (Windows: MSYSTEM=MINGW64 mingw64; macOS: Homebrew
      # prefix), pinned to the same jbig2enc version the dev image's Dockerfile uses.
      - name: provision toolchain + jbig2enc (Leptonica + poppler + qpdf + jbig2enc)
        id: natives
        uses: ./.github/actions/provision-natives
        with:
          jbig2: "true"

      - name: build register + despeckle app-images + sample
        run: >-
          ./gradlew :register:app:package :despeckle:app:package
          :register:infrastructure:createSamplePdf
          "-Pp4suta.nativePrefix=${{ steps.natives.outputs.native-prefix }}"
          --no-daemon --console=plain

      # register pipeline = pdfimages -> register (Leptonica FFM) -> jbig2 repack:
      # a JBIG2Decode stream proves the FFM path AND the from-source jbig2enc ran.
      # despeckle pipeline additionally linearizes via its bundled qpdf.
      - name: smoke register + despeckle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sample = "register\infrastructure\build\sample\sample.pdf"
          & "register\app\build\dist-jpackage\register\register.exe" pipeline $sample reg.pdf
          if ($LASTEXITCODE -ne 0) { throw "register exited $LASTEXITCODE" }
          ./scripts/dist-assert-pdf.ps1 reg.pdf JBIG2Decode
          & "despeckle\app\build\dist-jpackage\despeckle\despeckle.exe" pipeline $sample desp.pdf
          if ($LASTEXITCODE -ne 0) { throw "despeckle exited $LASTEXITCODE" }
          ./scripts/dist-assert-pdf.ps1 desp.pdf JBIG2Decode Linearized
      - name: smoke register + despeckle (macOS)
        if: runner.os == 'macOS'
        run: |
          sample="register/infrastructure/build/sample/sample.pdf"
          register/app/build/dist-jpackage/register.app/Contents/MacOS/register pipeline "$sample" reg.pdf
          bash scripts/dist-assert-pdf.sh reg.pdf JBIG2Decode
          despeckle/app/build/dist-jpackage/despeckle.app/Contents/MacOS/despeckle pipeline "$sample" desp.pdf
          bash scripts/dist-assert-pdf.sh desp.pdf JBIG2Decode Linearized

      - name: upload app-images
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jbig2-apps-${{ matrix.os }}
          path: |
            register/app/build/dist-jpackage/
            despeckle/app/build/dist-jpackage/
          if-no-files-found: error

      - name: upload staged natives on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jbig2-apps-${{ matrix.os }}-debug
          path: |
            register/app/build/dist-natives/
            despeckle/app/build/dist-natives/
            register/app/build/dist-jpackage/
            despeckle/app/build/dist-jpackage/
          if-no-files-found: ignore

  # Single aggregate context to require in branch protection. Matrix legs expand
  # to per-OS contexts ("tate jpackage + smoke (macos-latest)" …) that churn when
  # the matrix changes; gating on one job that fans them in is the stable form.
  # `if: always()` + explicit result checks make a skipped/cancelled leg fail the
  # gate too (a bare `needs:` would let a cancelled leg pass).
  distribution-complete:
    name: distribution complete
    needs: [dist-linux, dist-tate-crossos, dist-pdfbook-crossos, dist-webapp-crossos, dist-jbig2-apps-crossos]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: assert all distribution legs passed
        run: |-
          if [ "${{ needs.dist-linux.result }}" != "success" ] \
            || [ "${{ needs.dist-tate-crossos.result }}" != "success" ] \
            || [ "${{ needs.dist-pdfbook-crossos.result }}" != "success" ] \
            || [ "${{ needs.dist-webapp-crossos.result }}" != "success" ] \
            || [ "${{ needs.dist-jbig2-apps-crossos.result }}" != "success" ]; then
            echo "::error::a distribution leg did not succeed"
            exit 1
          fi
