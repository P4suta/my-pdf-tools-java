# Production profile — activated by SPRING_PROFILES_ACTIVE=prod (the Docker runtime image sets it).
# Differs from the loopback dev defaults in application.yml; everything else is inherited.
server:
  # Bind all interfaces inside the container; publish locally with `-p 127.0.0.1:8080:8080`, or put a
  # TLS-terminating reverse proxy in front (see ADR-0009) before any real exposure.
  address: 0.0.0.0
  error:
    # Never echo exception messages, stack traces, or binding errors in responses — ApiExceptionHandler
    # returns curated problem+json; anything reaching the container's default error path must not leak
    # internals.
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

# Hide the API docs in production: the OpenAPI JSON and Swagger UI enumerate every endpoint, a recon
# surface on an exposed instance. They stay on in dev (application.yml keeps the springdoc defaults).
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  # Move the whole actuator surface off the public connector onto a SEPARATE loopback port
  # (ADR-0009's stated prerequisite for exposure). The app connector binds 0.0.0.0:8080 for the
  # reverse proxy; /actuator/* lives on 8081 bound to loopback, so it is reachable only from inside
  # this container/host — never through the published app port, and the proxy never forwards it.
  # Health-check it from within the container (a Dockerfile HEALTHCHECK or `docker exec ... curl
  # localhost:8081/actuator/health`); for a sidecar on the Docker network, bind 0.0.0.0 here and
  # leave 8081 unpublished. See deploy/reverse-proxy/README.md.
  server:
    address: 127.0.0.1
    port: 8081
  endpoints:
    web:
      exposure:
        # Now that the management port is loopback-only, the metrics/Prometheus recon surface is no
        # longer publicly reachable, so serve the full observability set there again (as in dev).
        include: health, info, metrics, prometheus
  endpoint:
    health:
      # Loopback-only now, so full health details (binary paths, work dir, queue internals) are
      # safe to show to a local operator/health check again.
      show-details: always

logging:
  structured:
    format:
      # One JSON object per line (Elastic Common Schema) for log scraping in the container; MDC
      # entries (the per-job `jobId`) become JSON fields automatically. Dev keeps human-readable logs.
      console: ecs
