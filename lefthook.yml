# lefthook — git hooks runner.
#
# One-time install: `just hooks`. Every step delegates to a justfile `_hook-*`
# recipe so tools route through the dev container the same way `just lint` does —
# no tool is assumed to exist on the host.
#
# Policy: formatters run with `stage_fixed: true` — the author writes code,
# lefthook fixes formatting on the way to the index, the commit captures the
# fixed form. CI re-runs the same tools in check mode.

assert_lefthook_installed: true
no_tty: false
colors: true

pre-commit:
  parallel: false
  follow: true
  commands:
    # ---- auto-fixers (stage_fixed = true) ----
    spotless:
      tags: format
      glob: "*.java"
      run: just _hook-spotless-apply
      stage_fixed: true

    taplo-fmt:
      tags: format
      glob: "*.toml"
      run: just _hook-taplo-fmt {staged_files}
      stage_fixed: true

    biome-format:
      tags: format
      glob: "{*.json,*.jsonc}"
      run: just _hook-biome-format {staged_files}
      stage_fixed: true

    yamlfmt:
      tags: format
      glob: "{*.yml,*.yaml}"
      run: just _hook-yamlfmt {staged_files}
      stage_fixed: true

    typos-fix:
      tags: spell
      run: just _hook-typos-fix {staged_files}
      stage_fixed: true

    # ---- checks (no auto-fix; author must address) ----
    actionlint:
      tags: ci
      # Per-app .github/ is kept until the CI cutover, so workflows live at
      # <app>/.github/workflows/. Match them at any depth (a root
      # .github/workflows is covered by the same ** glob once it exists).
      glob: "{**/.github/workflows/*.yml,**/.github/workflows/*.yaml}"
      run: just _hook-actionlint {staged_files}

pre-push:
  # Mirror the CI gates so failures surface before the PR, not after.
  piped: true
  commands:
    build:
      tags: build
      run: just build
      only:
        - run: git rev-list --count HEAD ^@{upstream} 2>/dev/null || git rev-list --count HEAD
    lint:
      tags: lint
      run: just fmt-check typos-check actionlint
      only:
        - run: git rev-list --count HEAD ^@{upstream} 2>/dev/null || git rev-list --count HEAD
